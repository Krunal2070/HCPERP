<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recover Device — HCP Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--brand:#0d9488;--brand-dark:#0f766e;--bg:#f8f9fb;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#d1d5db;--error:#e11d48;--success:#059669;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{overflow-x:hidden;}
  body{font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;background:var(--bg);background-image:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(13,148,136,.05) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 85% 90%,rgba(6,182,212,.04) 0%,transparent 70%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:24px 16px;}
  .card{background:var(--card);width:430px;max-width:100%;border-radius:20px;padding:38px 36px 32px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.07),0 16px 40px rgba(0,0,0,.05);border:1.5px solid var(--border);animation:up .5s cubic-bezier(.22,.68,0,1.2) both;position:relative;overflow:hidden;}
  @keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
  .card::before{content:'';position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--brand-dark),var(--brand),#a8eddc,var(--brand));background-size:200% auto;}
  .ic{width:56px;height:56px;margin:0 auto 18px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(13,148,136,.18);}
  .ic svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  h2{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:6px;text-align:center;letter-spacing:-.3px;}
  .sub{font-size:.83rem;color:var(--muted);margin-bottom:24px;text-align:center;line-height:1.5;}
  .msg{padding:11px 14px;border-radius:10px;font-size:.83rem;margin-bottom:18px;font-weight:600;display:none;align-items:flex-start;gap:8px;}
  .msg.show{display:flex;}
  .msg.err{background:rgba(225,29,72,.06);color:var(--error);border:1px solid rgba(225,29,72,.15);}
  .msg.ok{background:rgba(5,150,105,.06);color:var(--success);border:1px solid rgba(5,150,105,.15);}
  .grp{margin-bottom:11px;}
  label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;font-family:inherit;font-weight:500;color:var(--text);outline:none;transition:.2s;}
  input:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(13,148,136,.12);}
  input.code{font-family:'SFMono-Regular','Consolas',monospace;letter-spacing:.05em;text-transform:uppercase;}
  button{width:100%;padding:13px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border:none;color:#fff;border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:700;font-family:inherit;margin-top:18px;letter-spacing:.02em;transition:.15s;box-shadow:0 4px 14px rgba(13,148,136,.18);}
  button:hover:not(:disabled){filter:brightness(1.06);transform:translateY(-1px);}
  button:disabled{opacity:.55;cursor:not-allowed;}
  .divider{height:1px;background:var(--border);margin:22px 0 14px;}
  .foot{font-size:.78rem;color:#94a3b8;font-weight:500;text-align:center;}
  .foot a{color:var(--brand);text-decoration:none;font-weight:700;}
  .foot a:hover{text-decoration:underline;}
  .new-code-box{background:#f0fdfa;border:1.5px dashed var(--brand);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
  .new-code-box .lbl{font-size:.72rem;font-weight:700;color:var(--brand-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .new-code-box .val{font-family:'SFMono-Regular','Consolas',monospace;font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .new-code-box .copy{background:#fff;border:1.5px solid var(--brand);border-radius:7px;padding:5px 10px;font-size:.72rem;font-weight:700;color:var(--brand);cursor:pointer;font-family:inherit;}
  .new-code-box .warn{font-size:.72rem;color:var(--brand-dark);margin-top:8px;font-weight:600;}
  @media (max-width:480px){
    .card{padding:30px 22px 24px;border-radius:16px;}
    h2{font-size:1.15rem;}
    input{font-size:1rem;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="ic">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Recover device access</h2>
    <p class="sub">Enter your credentials and the recovery code you saved earlier.</p>

    <div class="msg err" id="errMsg"></div>
    <div class="msg ok"  id="okMsg"></div>

    <div id="newCodeBlock" style="display:none;">
      <div class="new-code-box">
        <div class="lbl">Your NEW recovery code</div>
        <div class="val"><span id="newCodeVal">—</span><button class="copy" onclick="copyNew()">Copy</button></div>
        <div class="warn">Save this somewhere safe. The old code is now used up.</div>
      </div>
      <a href="/login" class="foot" style="display:block;text-align:center;text-decoration:none;font-weight:700;color:var(--brand);">Continue to login &rarr;</a>
    </div>

    <form id="recoverForm" autocomplete="off">
      <div class="grp"><label>Username</label><input type="text" id="uid" required></div>
      <div class="grp"><label>Password</label><input type="password" id="pwd" required></div>
      <div class="grp"><label>Recovery code</label><input type="text" id="code" class="code" placeholder="HCP-XXXX-XXXX" required></div>
      <button type="submit" id="submitBtn">Recover device</button>
    </form>

    <div class="divider"></div>
    <div class="foot"><a href="/login">&larr; Back to login</a></div>
  </div>

<script>
const form=document.getElementById('recoverForm');
const errMsg=document.getElementById('errMsg');
const okMsg =document.getElementById('okMsg');
const submitBtn=document.getElementById('submitBtn');
function show(el,t){el.textContent=t; el.classList.add('show');}
function hide(el){el.classList.remove('show');}
function copyNew(){const v=document.getElementById('newCodeVal').textContent.trim(); navigator.clipboard.writeText(v);}

form.addEventListener('submit', async e => {
  e.preventDefault(); hide(errMsg); hide(okMsg);
  submitBtn.disabled=true; submitBtn.textContent='Recovering…';
  try{
    const res=await fetch('/api/device/recover',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        username:document.getElementById('uid').value.trim(),
        password:document.getElementById('pwd').value,
        recovery_code:document.getElementById('code').value.trim().toUpperCase(),
      })
    });
    const d=await res.json();
    if(res.ok && d.status==='ok'){
      show(okMsg,d.message||'Device approved.');
      document.getElementById('newCodeVal').textContent=d.new_recovery_code||'—';
      document.getElementById('newCodeBlock').style.display='block';
      form.style.display='none';
    } else {
      show(errMsg,d.message||'Recovery failed.');
      submitBtn.disabled=false; submitBtn.textContent='Recover device';
    }
  } catch(e){
    show(errMsg,'Network error. Try again.');
    submitBtn.disabled=false; submitBtn.textContent='Recover device';
  }
});
</script>
</body>
</html>
