<!-- ═══════════════════════════════════════════════════════════════════════
     STOCK TRANSFERS PANEL  (QR voucher — RM phase 2, PM-stock parity)
     ───────────────────────────────────────────────────────────────────────
     Included by templates/inventory/inventory_mgmt.html via Jinja include.

     LAYOUT (matches PM Stock's Material Movement screen):
       Three pill-style internal tabs at the top:
         📤 Material OUT   — Create-OUT card + Pending-OUT scanning list
         📥 Material IN    — In-Transit dashboard cards (click to receive)
         🗂 History        — Received + Cancelled vouchers, searchable

     The wide modal overlay (out_started / in_pending / read-only) stays
     unchanged — it's what opens when the user clicks a row to keep
     scanning or to confirm receipt.

     The "Simple Voucher (manual)" workflow now lives in its OWN sidebar
     panel — see static/inventory/inventory_simple_transfer.js. That
     module injects its own sidebar nav item, panel, and routes at
     runtime, so no edits needed in inventory_mgmt.html.

     CSS namespace: tr-*  +  trm-* (transfer-modal)
     JS pairs:  static/inventory/inventory_transfers.js
     Backend:   inventory/inventory_transfers.py  (UNCHANGED — same APIs)
═════════════════════════════════════════════════════════════════════════ -->
<style>
/* ─── Status badges (used in tables and modal header) ───────────── */

  border-radius:14px; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.5px;
}

.tr-status-in_pending  { background:#fef3c7; color:#92400e; border:1px solid #fcd34d; }
.tr-status-received    { background:#dcfce7; color:#15803d; border:1px solid #86efac; }
.tr-status-cancelled   { background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; }
.tr-status-draft       { background:#f3f4f6; color:#374151; border:1px solid #d1d5db; }

/* ─── PM-style internal pill tabs (OUT / IN / History) ──────────── */
.tr-pills{

  border-radius:10px; margin-bottom:14px;
}

/* ─── Create OUT card  (top of Material OUT pane) ───────────────── */
.tr-create-card{
  background:#fff; border:1.5px solid #e5e7eb;

}

}

/* ─── Section title (e.g. "Pending OUT vouchers") ───────────────── */
.tr-section-title{
  font-size:12px; font-weight:800; color:#111;
  margin:14px 0 8px;
  display:flex; align-items:center; gap:8px;
  text-transform:uppercase; letter-spacing:.4px;
}

  display:inline-block; width:8px; height:8px;
  border-radius:50%; background:#f59e0b;
  animation:trPulse 1.4s infinite;
}

  0%,100%{ opacity:1; transform:scale(1); }

}
.tr-section-meta{
  margin-left:auto;
  font-size:10.5px; color:#9ca3af; font-weight:600;
  text-transform:none; letter-spacing:0;
}

/* ─── In-Transit dashboard cards (Material IN pane) ─────────────── */
.tr-it-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;
}
.tr-it-card{

  padding:12px 14px;
  background:linear-gradient(135deg,#fff7ed,#ffedd5);
  border:1.5px solid #fdba74;
  border-radius:10px;
  cursor:pointer; transition:all .15s;
}

  border-color:#f59e0b;
  box-shadow:0 2px 10px rgba(245,158,11,.22);

.tr-it-card .info{ flex:1; min-width:0; }

  font-family:'JetBrains Mono',monospace;
}
.tr-it-card .route{
  font-size:11px; color:#6b7280; margin-top:2px;

}
.tr-it-card .meta{
  font-size:10px; color:#9ca3af; margin-top:2px;
}
.tr-it-card .boxes{ text-align:right; }
.tr-it-card .boxes .lbl{
  font-size:9px; color:#9ca3af; font-weight:700;
  text-transform:uppercase; letter-spacing:.4px;
}

  font-size:18px; font-weight:800; color:#c2410c;
  font-family:'JetBrains Mono',monospace;
}

/* ─── History filter toolbar ────────────────────────────────────── */
.tr-hist-toolbar{
  display:flex; gap:8px; align-items:center;
  flex-wrap:wrap; margin-bottom:12px;
}
.tr-hist-toolbar .search{
  flex:1; min-width:200px; max-width:360px;
}
.tr-hist-toolbar input[type="search"],
.tr-hist-toolbar input[type="date"]{
  width:100%; padding:7px 10px;
  border:1px solid #d1d5db; border-radius:6px;
  font-size:12px; box-sizing:border-box;
}

.trm-body{ padding:14px 20px; overflow-y:auto; flex:1; }

}
.trm-form-row{

}

.trm-field label{

.trm-scan-row .ico{ font-size:22px; }
.trm-scan-row .col{ flex:1; }
.trm-scan-row .col label{

}
.trm-modal.mode-in .trm-scan-row .col label{ color:#1e40af; }
.trm-scan-input{

.trm-scan-help{ font-size:10.5px; color:#6b7280; margin-top:6px; padding-left:32px; }

}
.trm-tot{

}

/* ═══════════════════════════════════════════════════════════════════
   COMPACT-MODE OVERRIDES (2026-05-18)
   ───────────────────────────────────────────────────────────────────
   The original modal was sized for big-screen warehouse terminals.
   Operators reported it looks oversized on 1440px laptops. This block
   shrinks every dimension to ~70% while preserving readability.
   Appended at the end so these declarations win on equal-specificity.
═══════════════════════════════════════════════════════════════════ */
/* Modal width: cap tighter so it doesn't stretch on wide monitors */
.trm-modal{
  width:min(96vw,1100px); max-width:1100px;
  max-height:calc(100vh - 30px);
  border-radius:10px;
}
/* Header: smaller font, less padding */
.trm-head{ padding:10px 16px; border-bottom-width:2px; }
.trm-head-title-lbl{ font-size:10px; letter-spacing:.4px; }
.trm-head-vno{ font-size:14px; margin-top:1px; }
.trm-head-route{ font-size:11px; }
.trm-head-route .l{ font-size:9.5px; margin-top:1px; }
.trm-close{ width:26px; height:26px; font-size:15px; }
.tr-status-badge{
  padding:2px 7px; font-size:9.5px; letter-spacing:.3px;
}

/* Body: tighter padding */
.trm-body{ padding:10px 16px; }
.trm-banner{ padding:6px 10px; font-size:11px; margin-bottom:10px; }

/* Form rows: shrink fields */
.trm-form-row{ gap:10px; margin-bottom:10px; }
.trm-field label{ font-size:9.5px; letter-spacing:.4px; margin-bottom:3px; }
.trm-field input, .trm-field select{
  padding:7px 10px; font-size:12.5px; border-radius:6px;
}

/* Scan strip: dramatically smaller */
.trm-scan-strip{
  padding:8px 10px; margin-bottom:10px; border-radius:6px;
}
.trm-scan-row{ gap:8px; }
.trm-scan-row .ico{ font-size:16px; }
.trm-scan-row .col label{ font-size:9.5px; letter-spacing:.3px; }
.trm-scan-input{
  padding:7px 10px !important; font-size:12.5px !important;
  margin-top:3px;
}
.trm-scan-help{ font-size:10px; margin-top:4px; padding-left:24px; }
.trm-scan-feedback{ font-size:10.5px; margin-top:4px; padding-left:24px; }

/* Totals strip: shorter cards */
.trm-totals{ gap:6px; margin-bottom:8px; }
.trm-tot{ padding:6px 10px; border-radius:5px; }
.trm-tot .lbl{ font-size:8.5px; letter-spacing:.3px; }
.trm-tot .val{ font-size:14px; }
.trm-tot .progress-bar{ margin-top:3px; height:5px; }

/* Packages table: tighter rows */
.trm-packages-wrap{ border-radius:6px; }
.trm-packages-head{
  padding:6px 10px; font-size:11px;
}
.trm-packages-tbl thead th{
  padding:6px 8px; font-size:10px; letter-spacing:.3px;
}
.trm-packages-tbl tbody td{
  padding:6px 8px; font-size:11.5px;
}
.trm-packages-tbl .no-data{ padding:14px 8px; font-size:11px; }

/* Footer buttons: smaller */
.trm-foot{ padding:9px 16px; gap:8px; }
.trm-foot .btn{ padding:6px 13px; font-size:12px; }

/* Panel-level (outside modal): tighter pill bar so the panel header
   feels lighter too. */
.tr-pills{ padding:3px; margin-bottom:10px; }
.tr-pill{ padding:6px 14px; font-size:11.5px; }
.tr-pill .count{ min-width:16px; height:14px; padding:0 5px; font-size:8.5px; }
.tr-section-title{ font-size:11px; margin:10px 0 6px; }
.tr-create-card{ padding:10px 14px; margin-bottom:12px; border-radius:8px; }
.tr-create-title{ font-size:12px; }
.tr-create-grid{ gap:8px; }
.tr-create-grid label{ font-size:9.5px; margin-bottom:3px; }
.tr-create-grid select, .tr-create-grid input{
  padding:6px 9px; font-size:11.5px; border-width:1px;
}
.tr-create-btn{ padding:7px 14px; font-size:11.5px; }
.tr-it-card{ padding:9px 11px; border-radius:8px; }
.tr-it-card .icon{ font-size:18px; }
.tr-it-card .num{ font-size:11.5px; }
.tr-it-card .route{ font-size:10.5px; }
.tr-it-card .meta{ font-size:9.5px; }
.tr-it-card .boxes .val{ font-size:15px; }

</style>

    </div>

    <!-- ═══ MATERIAL OUT PANE ═══════════════════════════════════════ -->
    <div id="tr-pane-out" class="tr-pill-pane active">

      <!-- Create OUT card -->
      <div class="tr-create-card">
        <div class="tr-create-head">
          <span class="tr-create-title">📤 Create new OUT voucher</span>
          <span style="font-size:10.5px;color:#9ca3af;font-weight:600">
            Pick from + to, then click create. The voucher opens for scanning.
          </span>
        </div>
        <div class="tr-create-grid">
          <div>
            <label>From godown <span style="color:#dc2626">*</span></label>
            <select id="tr-create-from">
              <option value="">— select —</option>
            </select>
          </div>
          <div>
            <label>To godown <span style="color:#dc2626">*</span></label>
            <select id="tr-create-to">
              <option value="">— select —</option>
            </select>
          </div>
          <div>
            <label>Remarks</label>
            <input type="text" id="tr-create-remarks"
                   placeholder="e.g. Production run for batch B-2026-04"
                   maxlength="255">
          </div>
          <div>
            <label>&nbsp;</label>
            <button class="tr-create-btn" onclick="invTrCreateOutClick()">
              <i class="fas fa-plus"></i> Create OUT
            </button>
          </div>
        </div>
      </div>

      <!-- Pending OUT vouchers (status=out_started — still being scanned) -->
      <div class="tr-section-title">
        Pending OUT vouchers (still scanning)
        <span class="tr-section-meta" id="tr-out-pending-meta">—</span>
      </div>
      <div class="inv-table-wrap">
        <div class="inv-table-scroll">
          <table class="inv-table">
            <thead>
              <tr>
                <th style="width:50px">#</th>
                <th style="width:170px">OUT voucher no.</th>
                <th style="width:110px">Date</th>
                <th>From godown</th>
                <th>To godown</th>
                <th style="width:90px;text-align:right">Packages</th>
                <th style="width:120px;text-align:right">Total qty</th>
                <th style="width:110px" class="td-center">Action</th>
              </tr>
            </thead>
            <tbody id="tr-out-pending-body">
              <tr><td colspan="8" class="no-data">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ═══ MATERIAL IN PANE ════════════════════════════════════════ -->
    <div id="tr-pane-in" class="tr-pill-pane">
      <div class="tr-section-title">
        <span class="pulse"></span>
        In transit — awaiting receipt at destination
        <span class="tr-section-meta" id="tr-it-meta">—</span>
      </div>

      <!-- Auto-route scan bar: scan ANY in-transit box, system finds its
           voucher and receives the package straight in — no need to open the
           voucher. A brief confirmation flashes after each scan. -->
      <div id="tr-autoroute-box" style="border:1px solid #b6e3d4;background:#f0fbf6;
           border-radius:12px;padding:12px 14px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:800;letter-spacing:.04em;
             text-transform:uppercase;color:#0f766e;margin-bottom:6px">
          <i class="fas fa-barcode"></i> Scan any in-transit box (auto-receives into its voucher)
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="tr-autoroute-input" type="text" autocomplete="off"
                 placeholder="e.g. RM-A0000003 + Enter"
                 style="flex:1;padding:10px 13px;border:2px solid #0f766e;border-radius:9px;
                        font-size:14px;font-family:ui-monospace,Menlo,Consolas,monospace"
                 onkeydown="if(event.key==='Enter'){event.preventDefault();invTrAutoRoute();}">
          <button class="btn" onclick="invTrAutoRoute()"
                  style="background:#0f766e;color:#fff;padding:9px 16px;border-radius:9px;
                         font-weight:700;border:none;cursor:pointer">Find</button>
        </div>
        <div id="tr-autoroute-msg" style="font-size:12px;color:#0f766e;margin-top:6px;min-height:16px">
          Scan a box — the system finds the right voucher and receives it for you.
        </div>
      </div>

      <div class="tr-it-grid" id="tr-it-grid">
        <div class="no-data" style="grid-column:1 / -1;text-align:center;
                                    color:#9ca3af;font-style:italic;
                                    padding:40px 12px">
          Loading…
        </div>
      </div>
    </div>

    <!-- ═══ HISTORY PANE (received + cancelled, searchable) ══════════ -->
    <div id="tr-pane-history" class="tr-pill-pane">
      <div class="tr-hist-toolbar">
        <div class="search">
          <input type="search" id="tr-hist-search"
                 placeholder="Search by transfer #, godown, remarks…"
                 oninput="invTrRenderHistory()">
        </div>
        <div>
          <select id="tr-hist-status-filter"
                  onchange="invTrRenderHistory()"
                  style="padding:7px 10px;border:1px solid #d1d5db;
                         border-radius:6px;font-size:12px;background:#fff">
            <option value="">All completed</option>
            <option value="received">Received only</option>
            <option value="cancelled">Cancelled only</option>
          </select>
        </div>
        <div style="margin-left:auto;font-size:10.5px;color:#9ca3af;font-weight:600"
             id="tr-hist-meta">—</div>
      </div>
      <div class="inv-table-wrap">
        <div class="inv-table-scroll">
          <table class="inv-table">
            <thead>
              <tr>
                <th style="width:50px">#</th>
                <th style="width:170px">Voucher no.</th>
                <th style="width:110px">Date</th>
                <th>From godown</th>
                <th>To godown</th>
                <th style="width:90px;text-align:right">Packages</th>
                <th style="width:120px;text-align:right">Total qty</th>
                <th style="width:110px">Status</th>
                <th style="width:80px" class="td-center">View</th>
              </tr>
            </thead>
            <tbody id="tr-hist-body">
              <tr><td colspan="9" class="no-data">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ═══ MATERIAL REQUEST PANE ════════════════════════════════════
         The Material Request workflow (formerly its own sidebar panel)
         now lives here as a 4th pill tab. inventory_material_request.js
         renders its list / create / detail views into #tr-pane-request.
    ═════════════════════════════════════════════════════════════════ -->
    <div id="tr-pane-request" class="tr-pill-pane">
      <div class="no-data" style="text-align:center;color:#9ca3af;
                                  font-style:italic;padding:40px 12px">
        Loading…
      </div>
    </div>

  </div>
</template>

<!-- ════════════════════════════════════════════════════════════════════
     TRANSFER MODAL (single overlay reused for OUT / IN / read-only)
     Rendered directly (not in a template) since position:fixed.
     ═════════════════════════════════════════════════════════════════ -->
<div class="trm-overlay" id="trmOverlay" onclick="invTrModalBgClick(event)">
  <div class="trm-modal" id="trmModal" onclick="event.stopPropagation()">

    <div class="trm-head">
      <div class="trm-head-row">
        <div>
          <div class="trm-head-title-lbl" id="trmHeadTitle">📤 Material OUT voucher</div>
          <div class="trm-head-vno"><span id="trmVno">—</span></div>
        </div>
        <div class="trm-head-route">
          <div class="l">FROM <strong><span id="trmFromName">—</span></strong></div>
          <div class="l">TO <strong><span id="trmToName">—</span></strong></div>
        </div>
        <div id="trmStatusBadge"></div>
        <button class="trm-close" onclick="invTrCloseModal()" title="Close">×</button>
      </div>
    </div>

    <div class="trm-body">
      <div class="trm-banner" id="trmBanner">Loading…</div>

      <!-- Header form (locked once a voucher exists) -->
      <div class="trm-form-row">
        <div class="trm-field">
          <label>Date <span class="req">*</span></label>
          <input type="date" id="trmDate">
        </div>
        <div class="trm-field">
          <label>From godown <span class="req">*</span></label>
          <select id="trmFromGodown" onchange="invTrFromChanged()">
            <option value="">— select —</option>
          </select>
        </div>
        <div class="trm-field">
          <label>To godown <span class="req">*</span></label>
          <select id="trmToGodown" onchange="invTrToChanged()">
            <option value="">— select —</option>
          </select>
        </div>
      </div>
      <div class="trm-form-row full">
        <div class="trm-field">
          <label>Remarks</label>
          <input type="text" id="trmRemarks" maxlength="255" placeholder="Optional…">
        </div>
      </div>

      <!-- Scan strip -->
      <div class="trm-scan-strip" id="trmScanStrip">
        <div class="trm-scan-row">
          <div class="ico" id="trmScanIcon">📷</div>
          <div class="col">
            <label id="trmScanLabel">Scan package (or paste code + Enter)</label>
            <input type="text" id="trmScanInput" class="trm-scan-input"
                   placeholder="e.g. RM-A0000001"
                   onkeydown="invTrScanKey(event)" autocomplete="off">
          </div>
        </div>
        <div class="trm-scan-help" id="trmScanHelp">
          Each scan attaches the package to this transfer and flips it to "in transit".
        </div>
        <div class="trm-scan-feedback" id="trmScanFeedback"></div>
      </div>

      <!-- Totals strip -->
      <div class="trm-totals">
        <div class="trm-tot">
          <div class="lbl">Packages</div>
          <div class="val" id="trmTotPackages">0</div>
        </div>
        <div class="trm-tot t-qty">
          <div class="lbl">Total qty</div>
          <div class="val" id="trmTotQty">0</div>
        </div>
        <div class="trm-tot t-progress" id="trmTotProgress" style="display:none">
          <div class="lbl">Scanned in</div>
          <div class="val" id="trmProgressText">0 / 0</div>
          <div class="progress-bar">
            <span class="progress-fill" id="trmProgressFill" style="width:0%;display:block"></span>
          </div>
        </div>
      </div>

      <!-- Packages table -->
      <div class="trm-packages-wrap">
        <div class="trm-packages-head">
          <span id="trmPackagesHeadLabel">Packages being scanned OUT</span>
        </div>
        <table class="trm-packages-tbl">
          <thead>
            <tr>
              <th style="width:50px">#</th>
              <th style="width:160px">Package code</th>
              <th>Material</th>
              <th style="width:130px">Batch</th>
              <th style="width:120px" class="right">Qty</th>
              <th style="width:80px" class="center" id="trmColScanIn">IN?</th>
              <th style="width:50px"></th>
            </tr>
          </thead>
          <tbody id="trmPackagesBody">
            <tr><td colspan="7" class="no-data">No packages yet — scan one above</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="trm-foot">
      <button class="btn btn-ghost" id="trmCancelBtn"
              onclick="invTrCancelCurrent()" style="display:none">
        <i class="fas fa-times-circle"></i> Cancel transfer
      </button>
      <div class="trm-spacer"></div>
      <button class="btn btn-ghost" onclick="invTrCloseModal()">Close</button>
      <button class="btn btn-primary" id="trmSubmitOutBtn"
              onclick="invTrSubmitOut()" style="display:none">
        <i class="fas fa-paper-plane"></i> Submit OUT (mark in transit)
      </button>
      <button class="btn btn-primary" id="trmConfirmInBtn"
              onclick="invTrConfirmIn()"
              style="display:none;background:#16a34a;border-color:#16a34a">
        <i class="fas fa-check-circle"></i> Confirm receipt
      </button>
      <button class="btn" id="trmReconcileBtn"
              onclick="invTrReconcileOpen()"
              style="display:none;background:#B06000;border-color:#B06000;color:#fff">
        <i class="fas fa-scale-balanced"></i> Reconcile (admin)
      </button>
    </div>
  </div>
</div>
<!-- end .trm-overlay -->
